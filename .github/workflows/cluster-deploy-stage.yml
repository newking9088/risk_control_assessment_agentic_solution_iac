name: "Deploy_vCluster_Stage"

on:
  workflow_dispatch:

jobs:
  get_env_configs:
    name: "Get Stage Environment Config"
    runs-on:
      group: ${{ vars.RUNNER_GROUP }}
    environment: stage
    outputs:
      git_folder:     ${{ steps.config.outputs.git_folder }}
      env_id:         ${{ steps.config.outputs.env_id }}
      app_name:       ${{ steps.config.outputs.app_name }}
      gh_environment: ${{ steps.config.outputs.gh_environment }}
      vcluster_name:  ${{ steps.config.outputs.vcluster_name }}

    steps:
      - name: Compute config outputs
        id: config
        shell: bash
        run: |
          VCLUSTER_NAME=$(echo "${{ vars.APP_NAME }}" | tr '[:upper:]' '[:lower:]')

          echo "git_folder=${{ vars.GIT_FOLDER }}"         >> "$GITHUB_OUTPUT"
          echo "env_id=${{ vars.ENV_ID }}"                 >> "$GITHUB_OUTPUT"
          echo "app_name=${{ vars.APP_NAME }}"             >> "$GITHUB_OUTPUT"
          echo "gh_environment=${{ vars.GH_ENVIRONMENT }}" >> "$GITHUB_OUTPUT"
          echo "vcluster_name=${{VCLUSTER_NAME}}"            >> "$GITHUB_OUTPUT"

  deploy_vcluster:
    name: "Deploy vCluster"
    needs: get_env_configs
    uses: ${{ vars.GH_ORG }}/${{ vars.REUSABLE_WORKFLOWS_REPO }}/.github/workflows/tool-deploy-vcluster.yml@main
    with:
      vcluster-name: "vc-${{ needs.get_env_configs.outputs.vcluster_name }}-${{ needs.get_env_configs.outputs.gh_environment }}"
      git-folder:    ${{ needs.get_env_configs.outputs.git_folder }}
      env-id:        ${{ needs.get_env_configs.outputs.env_id }}
      gh-environment: ${{ needs.get_env_configs.outputs.gh_environment }}
    secrets: inherit

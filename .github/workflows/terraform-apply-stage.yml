name: "Terraform Apply — Stage"

on:
  workflow_dispatch:
    inputs:
      databricks:
        description: "Apply Databricks sub-root instead of main root"
        type: boolean
        default: false
        required: false

concurrency:
  group: >-
    ${{
      github.event.inputs.databricks == 'true'
      && format('{0}-stage-databricks', github.repository)
      || format('{0}-stage', github.repository)
    }}
  cancel-in-progress: false

jobs:
  get_env_configs:
    name: "Get Stage Environment Config"
    runs-on:
      group: ${{ vars.RUNNER_GROUP }}
    environment: stage
    outputs:
      git_folder:        ${{ steps.config.outputs.git_folder }}
      env_id:            ${{ steps.config.outputs.env_id }}
      app_name:          ${{ steps.config.outputs.app_name }}
      tfe_workspace:     ${{ steps.config.outputs.tfe_workspace }}
      tfe_org:           ${{ steps.config.outputs.tfe_org }}
      tfe_hostname:      ${{ steps.config.outputs.tfe_hostname }}
      terraform_version: ${{ steps.config.outputs.terraform_version }}
      gh_environment:    ${{ steps.config.outputs.gh_environment }}

    steps:
      - name: Compute config outputs
        id: config
        shell: bash
        run: |
          GIT_FOLDER="${{ vars.GIT_FOLDER }}"
          TFE_WORKSPACE="${{ vars.TFE_WORKSPACE }}"

          if [[ "${{ github.event.inputs.databricks }}" == "true" ]]; then
            GIT_FOLDER="${{GIT_FOLDER}}/databricks"
            TFE_WORKSPACE="${{TFE_WORKSPACE}}1"
          fi

          echo "git_folder=${{GIT_FOLDER}}"                          >> "$GITHUB_OUTPUT"
          echo "env_id=${{ vars.ENV_ID }}"                         >> "$GITHUB_OUTPUT"
          echo "app_name=${{ vars.APP_NAME }}"                     >> "$GITHUB_OUTPUT"
          echo "tfe_workspace=${{TFE_WORKSPACE}}"                    >> "$GITHUB_OUTPUT"
          echo "tfe_org=${{ vars.TFE_ORG }}"                       >> "$GITHUB_OUTPUT"
          echo "tfe_hostname=${{ vars.TFE_HOSTNAME }}"             >> "$GITHUB_OUTPUT"
          echo "terraform_version=${{ vars.TERRAFORM_VERSION }}"   >> "$GITHUB_OUTPUT"
          echo "gh_environment=${{ vars.GH_ENVIRONMENT }}"         >> "$GITHUB_OUTPUT"

  terraform_apply:
    name: "Terraform Apply"
    needs: get_env_configs
    uses: ${{ vars.GH_ORG }}/${{ vars.REUSABLE_WORKFLOWS_REPO }}/.github/workflows/terraform-ngc-apply.yml@main
    with:
      git-folder:        ${{ needs.get_env_configs.outputs.git_folder }}
      env-id:            ${{ needs.get_env_configs.outputs.env_id }}
      app-name:          ${{ needs.get_env_configs.outputs.app_name }}
      tfe-workspace:     ${{ needs.get_env_configs.outputs.tfe_workspace }}
      tfe-org:           ${{ needs.get_env_configs.outputs.tfe_org }}
      tfe-hostname:      ${{ needs.get_env_configs.outputs.tfe_hostname }}
      terraform-version: ${{ needs.get_env_configs.outputs.terraform_version }}
      tfe-command:       "apply --auto-approve"
    secrets: inherit

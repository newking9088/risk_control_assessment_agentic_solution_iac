name: Terraform Bug Report
description: Report a bug in the IaC — plan/apply failure or unexpected resource state.
labels: [bug, terraform]
body:
  - type: input
    id: tf_version
    attributes:
      label: Terraform version
      placeholder: "1.6.0"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Include the full error output and the `terraform plan` or apply log.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirm
      options:
        - label: I ran `terraform fmt` and `terraform validate` and the error still occurs.
          required: true
        - label: I have NOT posted root Azure object IDs, subscription IDs, or secrets.
          required: true
